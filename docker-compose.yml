version: '3.8'

services:
  turboquant:
    build: .
    container_name: turboquant-service
    ports:
      - "8000:8000"
      - "7860:7860"
    volumes:
      - .:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
