name: Bug Report
description: Create a report to help us improve.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How did you encounter the bug? Please provide code if possible.
      placeholder: |
        1. Run `...`
        2. See error `...`
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Logs/Screenshots
      description: Copy-paste any relevant logs or attach screenshots.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, PyTorch version, etc.
