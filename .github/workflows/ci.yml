name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install core dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install requests pandas pyyaml pytest ruff mypy

    - name: Install package (core only)
      run: |
        pip install -e .

    - name: Install optional plugins (best effort)
      run: |
        pip install sentence-transformers || true
        pip install -e .[plugins] || true
      continue-on-error: true

    - name: Lint with ruff
      run: ruff check .

    - name: Type check with mypy
      run: |
        # Navigate to the package directory and run mypy
        cd $(dirname $(find . -name "setup.py" -type f | head -1))
        mypy --ignore-missing-imports turboquant/

    - name: Run tests
      run: pytest -q

  publish-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Check build
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        python -m build
        twine check dist/*
