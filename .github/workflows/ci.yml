name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install core dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install requests pandas pyyaml pytest ruff

    - name: Install package (core only)
      run: |
        pip install -e .

    - name: Install optional plugins (best effort)
      run: |
        pip install sentence-transformers || true
        pip install -e .[plugins] || true
      continue-on-error: true

    - name: Lint with ruff
      run: ruff check .

    - name: Run tests
      run: pytest -q

  # Optional: Type checking ( informational only)
  type-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        pip install mypy types-requests types-PyYAML || true
    - name: Type check (non-blocking)
      run: |
        mypy --ignore-missing-imports turboquant/ 2>&1 || echo "::warning::Type check failed (non-blocking)"
        exit 0

  publish-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Check build
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        python -m build
        twine check dist/*
